<!DOCTYPE html>

<head>

<title>FunTogether</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&family=Poppins:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#f7f7f5;min-height:100vh;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;}
.card{background:#fff;border-radius:22px;padding:28px 24px;box-shadow:0 2px 20px rgba(124,58,237,0.1);width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:8px;}
.appname{text-align:center;margin-bottom:4px;font-family:'Poppins',sans-serif;font-size:28px;font-weight:900;letter-spacing:-1px;}
.appname .p{color:#7c3aed;}.appname .t{color:#1a1a1a;}
.tagline{text-align:center;color:#9b8ab8;font-size:13px;margin-bottom:24px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;color:#9b8ab8;font-weight:600;margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid #e8e3f0;border-radius:12px;font-family:inherit;font-size:14px;color:#1a1a1a;outline:none;background:#fff;}
.fg input:focus,.fg select:focus{border-color:#7c3aed;}
.row2{display:flex;gap:10px;}.row2 .fg{flex:1;}
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;border:none;border-radius:13px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn-main:disabled{opacity:0.6;cursor:not-allowed;}
.btn-sec{width:100%;padding:13px;background:#fff;color:#7c3aed;border:1.5px solid #7c3aed;border-radius:13px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.err{background:#fff0f0;border:1px solid #ffc0c0;border-radius:10px;padding:10px 14px;font-size:12px;color:#cc0000;margin-top:10px;display:none;line-height:1.5;}
.uin-box{background:linear-gradient(135deg,#f5f0ff,#ede8ff);border:1.5px solid #c4b5fd;border-radius:16px;padding:20px;text-align:center;margin:18px 0;}
.uin-num{font-size:36px;font-weight:900;letter-spacing:6px;color:#7c3aed;font-family:'Poppins',sans-serif;}
.link-row{text-align:center;margin-top:14px;font-size:13px;color:#aaa;}
.link-row a{color:#7c3aed;font-weight:600;cursor:pointer;}
</style>
</head>

  <div class="appname"><span class="p">Fun</span><span class="t">Together</span></div>
  <div class="card" style="text-align:center;margin-top:16px;">
    <div style="font-size:40px;margin:8px 0;">💜</div>
    <div style="font-size:17px;font-weight:700;" id="main-hi">שלום!</div>
    <div style="font-size:13px;color:#b0a0cc;margin:8px 0 20px;">נרשמת בהצלחה ל-FunTogether</div>
    <div style="background:#f5f0ff;border-radius:12px;padding:16px;font-size:13px;color:#7c3aed;line-height:1.6;">
      🚧 מסך הצ'אט המלא בפיתוח<br>יהיה מוכן בקרוב!
    </div>
    <button class="btn-sec" id="btn-logout" style="margin-top:16px;">התנתק</button>
  </div>
</div>

<script>
var API = "https://be0d5b7e-b90b-4001-b23d-3dfe261c0ad8-00-sy5akcvq1r0j.janeway.replit.dev";
var token = null, user = null;

function go(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showErr(id, msg) {
  var e = document.getElementById(id);
  e.innerHTML = msg;
  e.style.display = 'block';
}
function hideErr(id) { document.getElementById(id).style.display = 'none'; }

document.getElementById('btn-to-reg').onclick   = function(){ go('sc-register'); };
document.getElementById('btn-to-login').onclick  = function(){ go('sc-login'); };
document.getElementById('btn-to-main').onclick   = function(){ go('sc-main'); };
document.getElementById('btn-logout').onclick    = function(){ token=null; user=null; go('sc-login'); };

document.getElementById('btn-login').onclick = async function() {
  hideErr('l-err');
  var email = document.getElementById('l-email').value.trim();
  var pass  = document.getElementById('l-pass').value;
  if (!email || !pass) { showErr('l-err','נא למלא אימייל וסיסמה'); return; }
  var btn = this; btn.textContent='מתחבר...'; btn.disabled=true;
  try {
    var res  = await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pass})});
    var data = await res.json();
    if (!res.ok) { showErr('l-err', data.error||'שגיאה בכניסה'); return; }
    token=data.token; user=data.user;
    document.getElementById('main-hi').textContent = 'שלום, '+user.nickname+'! 👋';
    go('sc-main');
  } catch(e) { showErr('l-err','שגיאת חיבור לשרת'); }
  finally { btn.textContent='כניסה'; btn.disabled=false; }
};

document.getElementById('btn-register').onclick = async function() {
  hideErr('r-err');
  var nick    = document.getElementById('r-nick').value.trim();
  var email   = document.getElementById('r-email').value.trim();
  var pass    = document.getElementById('r-pass').value;
  var birth   = document.getElementById('r-birth').value;
  var gender  = document.getElementById('r-gender').value;
  var interest= document.getElementById('r-interest').value;
  var bio     = document.getElementById('r-bio').value.trim();

  if (!nick)  { showErr('r-err','❌ נא להכניס כינוי'); return; }
  if (!email) { showErr('r-err','❌ נא להכניס אימייל'); return; }
  if (pass.length < 6) { showErr('r-err','❌ הסיסמה חייבת להיות לפחות 6 תווים'); return; }
  if (!birth) { showErr('r-err','❌ נא לבחור תאריך לידה'); return; }

  var btn = this; btn.textContent='יוצר חשבון...'; btn.disabled=true;

  try {
    var birthdateISO = new Date(birth + 'T12:00:00.000Z').toISOString();
    var body = {
      nickname:      nick,
      email:         email,
      password:      pass,
      birthdate:     birthdateISO,
      gender:        gender,
      interested_in: [interest],
      profile_text:  bio || ''
    };
    var res  = await fetch(API+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var data = await res.json();
    if (!res.ok) {
      var errMsg = data.error || 'שגיאה בהרשמה';
      if (Array.isArray(data.error)) {
        errMsg = data.error.map(function(e){ return e.message||JSON.stringify(e); }).join('<br>');
      }
      showErr('r-err', '❌ '+errMsg);
      return;
    }
    token=data.token; user=data.user;
    document.getElementById('uin-name').textContent = 'ברוכ/ה הבא/ה, '+user.nickname+'!';
    document.getElementById('uin-val').textContent  = user.uin;
    go('sc-uin');
  } catch(e) {
    showErr('r-err','❌ לא ניתן להתחבר לשרת.<br>ודא שהשרת ב-Replit פעיל.');
  } finally {
    btn.textContent='יצירת חשבון ✨'; btn.disabled=false;
  }
};
</script>
